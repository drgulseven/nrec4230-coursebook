<div class="reader-tools" data-reader-tools>
  <button
    class="reader-tools__toggle"
    type="button"
    aria-label="Open reader settings"
    aria-expanded="false"
    aria-controls="reader-tools-menu"
    data-reader-toggle
  >
    A
  </button>
  <div class="reader-tools__menu" id="reader-tools-menu" hidden data-reader-menu>
    <div class="reader-tools__group" role="group" aria-label="Text size">
      <div class="reader-tools__label">Text size</div>
      <button type="button" data-reader-size="normal">Normal</button>
      <button type="button" data-reader-size="large">+25%</button>
      <button type="button" data-reader-size="xlarge">+50%</button>
    </div>
    <div class="reader-tools__group" role="group" aria-label="Reading style">
      <div class="reader-tools__label">Style</div>
      <button type="button" data-reader-style="light">Light</button>
      <button type="button" data-reader-style="sepia">Sepia</button>
      <button type="button" data-reader-style="dark">Dark</button>
    </div>
  </div>
</div>
<script>
  (function () {
    var stylesheet = document.querySelector('link[href$="assets/reader-tools.css"]');
    var script = document.createElement("script");
    script.src = stylesheet
      ? stylesheet.href.replace(/reader-tools\.css(?:\?.*)?$/, "reader-tools.js")
      : "assets/reader-tools.js";
    script.defer = true;
    document.head.appendChild(script);
  })();
</script>
